name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches manifest version
        run: |
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match manifest version $MANIFEST_VERSION" >&2
            exit 1
          fi

      - name: Build extension zip
        run: |
          zip -r "slop-off-extension-${GITHUB_REF_NAME}.zip" \
            manifest.json background.js content.js \
            options.html options.js icons LICENSE

      - name: Create GitHub release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "slop-off-extension-${GITHUB_REF_NAME}.zip" \
            --title "Slop Off $GITHUB_REF_NAME" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
